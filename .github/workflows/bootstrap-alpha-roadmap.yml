name: Bootstrap alpha roadmap metadata

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-alpha-roadmap.yml

permissions:
  contents: write
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const milestones = [
              ['A0 – Technisches Fundament', 'Startfähige Client-Shell mit API-Anbindung, Authentifizierung, Fehlerzuständen und CI.'],
              ['A1 – Heimatplanet', 'Ein neuer Spieler kann eine Kampagne starten und sein Reich mit kolonisiertem Heimatplaneten laden und ansehen.'],
              ['A2 – Schiffe und lokales Sternensystem', 'Ein Erkundungsschiff ist im Heimatsternsystem sichtbar, auswählbar und bewegbar.'],
              ['A3 – Interstellare Erkundung', 'Eine Galaxiekarte zeigt Wissen und ermöglicht Reise und Erkundung eines Nachbarsystems.'],
              ['A4 – Zweite Kolonie', 'Ein geeigneter Himmelskörper kann ausgewählt, kolonisiert und als zweite Kolonie verwaltet werden.'],
              ['A5 – Bevölkerung und Arbeit', 'Bevölkerung, Beschäftigung, Migration und Prioritäten sind verständlich steuerbar.'],
              ['A6 – Wirtschaft, Gebäude und Versorgung', 'Gebäude, Güter, Produktion, Lager, Transport, Bedürfnisse und Haushalt sind bedienbar.'],
              ['A7 – Forschung und Technologien', 'Forschungsfortschritt, Auswahl, Voraussetzungen und Freischaltungen sind verständlich bedienbar.'],
              ['A8 – Flottenlogistik und Reparatur', 'Mehrere Flotten können verwaltet, versorgt, aufgeteilt und repariert werden.'],
              ['A9 – Andere Reiche und Erstkontakt', 'Andere Reiche und Erstkontaktinformationen werden wissensgefiltert dargestellt.'],
              ['A10 – Diplomatie und Handel', 'Beziehungen, Angebote, Verträge und Handel sind als vollständiger Ablauf bedienbar.'],
              ['A11 – Konflikt und Raumkampf', 'Krieg, Flottenbegegnung, Kampfbericht, Rückzug und Frieden sind bedienbar.'],
              ['A12 – Ereignisse, Krise und Kampagnenabschluss', 'Ereignisse, Krise, Siegespfade und Abschlussbericht sind als Kampagnenfinale bedienbar.']
            ];
            const existing = await github.paginate(github.rest.issues.listMilestones, { owner, repo, state: 'all', per_page: 100 });
            const result = [];
            for (const [title, description] of milestones) {
              let milestone = existing.find(item => item.title === title);
              if (!milestone) milestone = (await github.rest.issues.createMilestone({ owner, repo, title, description, state: 'open' })).data;
              else if (milestone.description !== description || milestone.state !== 'open') milestone = (await github.rest.issues.updateMilestone({ owner, repo, milestone_number: milestone.number, description, state: 'open' })).data;
              result.push({ number: milestone.number, title: milestone.title });
            }
            const labels = [
              ['roadmap', '0E8A16', 'Projektübergreifende Implementierungsroadmap'],
              ['alpha', '1D76DB', 'Teil einer spielbaren Alpha-Stufe'],
              ['client', 'D93F0B', 'Clientseitige Umsetzung'],
              ['codex-ready', '0052CC', 'Ausreichend konkret für lokale Codex-Umsetzung'],
              ['vertical-slice', 'FBCA04', 'Spielbarer End-to-End-Schnitt'],
              ['infrastructure', 'BFDADC', 'Build, App-Shell, Konfiguration oder CI'],
              ['authentication', 'D4C5F9', 'Registrierung, Anmeldung und Sessionoberfläche'],
              ['api', 'C2E0C6', 'REST-Anbindung und Zustandsmapping'],
              ['ui', 'F9D0C4', 'Benutzeroberfläche und Interaktion'],
              ['e2e', '7057FF', 'Kritischer End-to-End-Ablauf']
            ];
            for (const [name, color, description] of labels) {
              try { await github.rest.issues.getLabel({ owner, repo, name }); await github.rest.issues.updateLabel({ owner, repo, name, color, description }); }
              catch (error) { if (error.status !== 404) throw error; await github.rest.issues.createLabel({ owner, repo, name, color, description }); }
            }
            const path = '.github/alpha-roadmap-milestones.json';
            let sha;
            try { sha = (await github.rest.repos.getContent({ owner, repo, path, ref: 'main' })).data.sha; } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({ owner, repo, path, branch: 'main', sha, message: 'chore: record alpha roadmap milestones', content: Buffer.from(JSON.stringify(result, null, 2) + '\n').toString('base64') });
