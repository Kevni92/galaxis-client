name: Bootstrap alpha client issues

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-alpha-client-issues.yml

permissions:
  contents: write
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const specs = [];
            function add(alpha, title, featureId, labels, dependencies, goal, items, out, acceptance, tests) {
              specs.push({
                title: `[${alpha}][CLIENT] ${title}`,
                milestone: { A0: 1, A1: 2, A2: 3, A3: 4 }[alpha],
                labels: ['alpha', 'client', 'codex-ready', ...labels],
                body: `**Feature-ID:** \`${featureId}\`\n\n## Ziel\n${goal}\n\n## Umfang\n${items.map(x => `- ${x}`).join('\n')}\n\n## Nicht enthalten\n${out.map(x => `- ${x}`).join('\n')}\n\n## Abhängigkeiten\n${dependencies.map(x => `- ${x}`).join('\n')}\n\n## Akzeptanzkriterien\n${acceptance.map(x => `- [ ] ${x}`).join('\n')}\n\n## Tests und Nachweis\n${tests.map(x => `- ${x}`).join('\n')}\n\n## Fachliche Quellen\n- \`docs/contracts/rest-api/galaxis-rest-v1.md\`\n- \`docs/roadmap/IMPLEMENTATION-ROADMAP.md\`\n- Docs-Umbrella: \`Kevni92/galaxis-docs#${{A0:115,A1:116,A2:117,A3:118}[alpha]}\``
              });
            }

            add('A0', 'Vite-/Vue-Projektbasis und App-Shell einrichten', 'GAL-CLIENT-SHELL-001', ['infrastructure', 'ui'], ['Server A0 kann parallel entstehen'], 'Das leere Clientrepository wird als kleiner Desktop-Webclient reproduzierbar baubar und testbar.', ['Docs-Submodule einbinden', 'Vue 3, TypeScript, Vite, Vue Router und Pinia', 'Vitest, Vue Test Utils und Playwright', 'App-Shell mit Routing, Fehlergrenze und Konfigurationszugriff', 'README mit lokalen Startbefehlen'], ['Gameplayansichten', 'finales Designsystem', 'Desktopverpackung'], ['Frischer Clone lässt sich bauen und starten.', 'Keine Spielregel wird im Client modelliert.', 'API-Basis-URL ist konfigurierbar.', 'Komponenten- und E2E-Testziel existieren.'], ['Build-Smoke-Test', 'trivialer Komponenten-Test', 'Playwright öffnet App-Shell']);

            add('A0', 'OpenAPI-Typen und zentralen REST-Client einrichten', 'GAL-API-CORE-001', ['api', 'infrastructure'], ['galaxis-docs#128', 'galaxis-server#5'], 'Der Client verwendet die freigegebene OpenAPI-Spezifikation für Typen und eine zentrale Fetch-Abstraktion.', ['Typegenerierung aus Docs-OpenAPI', 'Request-Korrelation, JSON- und Fehlerabbildung', 'Bearer-Header über Session-Provider', 'Abbruchsignale und definierte Zeitüberschreitung', 'keine duplizierten Serverregeln'], ['vollständige SDK-Generierung', 'Offlinecache', 'WebSocket'], ['Vertragsänderungen brechen Typprüfung sichtbar.', 'Fehlerformat wird zentral in UI-Fehler übersetzt.', 'Unbekannte additive Felder werden toleriert.', 'Keine Komponente ruft `fetch` direkt auf.'], ['Unit-Tests des API-Clients', 'Mock-Contract-Test', 'Fehler- und Abbruchtest']);

            add('A0', 'Session-Store und geschützte Routen implementieren', 'GAL-AUTH-SESSION-001', ['authentication', 'api'], ['galaxis-server#7', 'GAL-API-CORE-001'], 'Anmeldestatus wird zentral verwaltet; geschützte Seiten werden erst nach bestätigter Serversession geöffnet.', ['Sessionzustände unknown, anonymous, authenticated und error', 'Bearer-Token in Memory und A0 optional sessionStorage', 'Sessionprüfung beim Start', 'Logout und Tokenlöschung', 'Router-Guard'], ['Refresh Tokens', 'Kampagnenberechtigungen', 'Remember-me'], ['Client behandelt lokale Tokenexistenz nicht als bestätigte Anmeldung.', '401 setzt Session kontrolliert zurück.', 'Logout entfernt Token und geschützten Zustand.', 'Store enthält keine Gameplayregeln.'], ['Store-Unit-Tests', 'Router-Guard-Test', 'Mock-Sessionablauf']);

            add('A0', 'Registrierungs- und Loginmaske umsetzen', 'GAL-AUTH-ACCOUNT-001', ['authentication', 'ui'], ['galaxis-server#6', 'galaxis-server#7', 'GAL-AUTH-SESSION-001'], 'Ein Benutzer kann sich über eine bewusst einfache Maske registrieren, anmelden und abmelden.', ['Registrierungsformular', 'Loginformular', 'serverseitige Feld- und Allgemeinfehler anzeigen', 'Lade- und Disabled-Zustände', 'Weiterleitung auf geschützte Startseite'], ['Passwort-Reset', 'E-Mail-Verifikation', 'Social Login'], ['Passwort wird nicht geloggt oder dauerhaft gespeichert.', 'Fehler verraten keine zusätzlichen Accountinformationen.', 'Doppelklick sendet keinen doppelten Request.', 'Tastaturbedienung und verständliche Labels funktionieren.'], ['Komponententests', 'API-Mock-Tests', 'Accessibility-Smoke']);

            add('A0', 'Globale Lade-, Fehler- und Verbindungszustände umsetzen', 'GAL-CLIENT-STATE-001', ['ui', 'api'], ['GAL-API-CORE-001', 'GAL-AUTH-SESSION-001'], 'Die minimale App unterscheidet klar zwischen Laden, offline/nicht erreichbar, nicht angemeldet und unerwartetem Fehler.', ['Health-/Readinessanzeige für Entwicklung', 'zentrale Fehlerdarstellung mit Korrelations-ID', 'Retry nur für sichere Abfragen', 'kein stilles Wiederholen von Befehlen'], ['vollständiges Benachrichtigungssystem', 'optimistische Gameplayupdates'], ['Benutzer erkennt Serverausfall gegenüber falscher Anmeldung.', 'Korrelations-ID kann kopiert werden.', 'POST-Befehle werden nicht automatisch dupliziert.'], ['Komponententests aller Zustände', 'Netzwerkfehler-Mock']);

            add('A0', 'A0-End-to-End-Smoke und CI einrichten', 'GAL-CLIENT-A0-E2E-001', ['e2e', 'vertical-slice', 'infrastructure'], ['alle A0-Client-Issues', 'Server A0 vollständig'], 'Die A0-Demo wird gegen einen echten lokalen Server reproduzierbar in Playwright ausgeführt.', ['Server und PostgreSQL im Testverbund starten', 'Registrieren, anmelden, Session prüfen, geschützte Seite öffnen, abmelden', 'Fehlerartefakte nur bei Fehlschlag', 'Chromium Desktop in PR'], ['Browsermatrix', 'visuelle Regression'], ['Test läuft nach frischem Clone.', 'Keine fest codierten Wartezeiten.', 'Fehler hinterlassen Trace und Serverlogs.', 'CI bleibt im Zielzeitkorridor.'], ['Playwright-Smoke', 'CI-Build und Unit-Tests']);

            add('A1', 'Kampagnenliste und Kampagnenerstellung umsetzen', 'GAL-CAMPAIGN-CREATE-001', ['api', 'ui'], ['galaxis-server#12', 'galaxis-docs#129'], 'Ein angemeldeter Account kann seine Kampagnen sehen und eine neue A1-Kampagne starten.', ['Liste mit Status und Zeitprofil', 'Create-Dialog mit minimalen Feldern', 'Idempotenzschlüssel pro Absendevorgang', 'Weiterleitung zur Kampagnenübersicht'], ['Mehrspielerbeitritt', 'Pause/Resume-Bedienung'], ['Doppelte Submit-Aktion erzeugt keine zweite Kampagne.', 'Serverfehler werden mit Feld-/Allgemeinfehlern dargestellt.', 'Keine lokalen Defaultregeln überschreiben Serverwerte.'], ['Store-/Komponententests', 'Mock-Contract-Test']);

            add('A1', 'Kampagnen-App-Shell und Zustandsbootstrap umsetzen', 'GAL-API-A1-STATE-001', ['api', 'ui'], ['galaxis-server#17', 'GAL-CAMPAIGN-CREATE-001'], 'Nach Auswahl einer Kampagne lädt der Client den kompakten Kampagnenstate und stellt Navigation zu Reich, System und Kolonie bereit.', ['Campaign-Store nach ID', 'stateVersion und ETag speichern', 'Linkrelationen statt selbst gebauter URLs verwenden', 'Reload und Fehlerzustände'], ['Changes-Feed', 'Pollingoptimierung'], ['Falscher Kampagnenzugriff wird ohne Informationsleck dargestellt.', 'Unbekannte Antwortfelder stören nicht.', 'Client markiert Zustand erst nach Serverantwort als geladen.'], ['Store-Unit-Tests', 'Mock-Snapshot-Test']);

            add('A1', 'Heimatsternsystem minimal darstellen', 'GAL-GALAXY-HOME-VIEW-001', ['ui', 'api'], ['galaxis-server#17', 'GAL-API-A1-STATE-001'], 'Das bekannte Heimatsternsystem wird als einfache, noch nicht interaktive Übersicht dargestellt.', ['Stern, bekannte Himmelskörper und Auswahlzustand', 'keine geometrische Simulation; servergelieferte Positionen verwenden', 'Links zu Planetendetails'], ['Galaxiekarte', 'Schiffe', 'Zoom-/Pan-Komplexität'], ['Nur bekannte Objekte erscheinen.', 'Ansicht funktioniert bei genau einem bekannten System.', 'Auswahl bleibt über URL oder Store nachvollziehbar.'], ['Komponententest mit Contract-Fixture', 'Unbekanntes-Objekt-Negativtest']);

            add('A1', 'Heimatplanet und Kolonieübersicht umsetzen', 'GAL-COLONY-HOME-001', ['ui', 'api'], ['galaxis-server#15', 'galaxis-server#16', 'GAL-GALAXY-HOME-VIEW-001'], 'Der Spieler sieht seinen kolonisierten Heimatplaneten mit Koloniestatus, Bevölkerung und Grundversorgung.', ['Planetengrunddaten', 'Kolonieidentität und Status', 'Bevölkerungs- und Bestandszusammenfassung', 'Quellen-/Zeitstempel bei Prognosen'], ['Gebäudesteuerung', 'Produktion', 'Bevölkerungsprioritäten'], ['Keine editierbaren Steuerelemente ohne Serverbefehl.', 'Einheiten und Werte werden eindeutig formatiert.', 'Fehlende optionale Daten besitzen klaren Zustand.'], ['Komponententests', 'Snapshot mit A1-Fixture']);

            add('A1', 'A1-Navigation, Deep Links und leere Zustände abschließen', 'GAL-CLIENT-A1-NAV-001', ['ui'], ['A1-Ansichten'], 'Kampagne, System, Planet und Kolonie sind über stabile Clientrouten direkt erreichbar und behandeln fehlende Ressourcen sauber.', ['Routeparameter und Breadcrumbs', '404/403/gelöscht/noch nicht geladen unterscheiden', 'Zurücknavigation'], ['globale Suche', 'mehrere Kolonien'], ['Direktlink nach Login wird wieder aufgenommen.', 'Nicht sichtbare IDs werden nicht erraten oder aufgezählt.', 'Fehlerseite bietet sicheren Rückweg.'], ['Routertests', 'Direct-link-Komponententest']);

            add('A1', 'A1-End-to-End-Demo Heimatplanet absichern', 'GAL-CLIENT-A1-E2E-001', ['e2e', 'vertical-slice'], ['alle A1-Client-Issues', 'galaxis-server#19'], 'Die komplette A1-Demo wird gegen echten Server ausgeführt.', ['registrieren/anmelden', 'Kampagne erstellen', 'Heimatsystem öffnen', 'Heimatplanet und Kolonie sehen', 'Seite neu laden und Zustand erneut prüfen'], ['visuelle Detailabnahme'], ['Test benötigt keine vorbereiteten persönlichen Daten.', 'Seed und Kampagnen-ID werden im Fehlerfall protokolliert.', 'Reload zeigt identischen sichtbaren Zustand.'], ['Playwright A1-Smoke']);

            add('A2', 'Lokale Sternensystemkarte als SVG-MVP umsetzen', 'GAL-CLIENT-SYSTEM-MAP-001', ['ui', 'api'], ['galaxis-server#25', 'galaxis-docs#130'], 'Das Heimatsternsystem zeigt bekannte lokale Navigationspunkte, Himmelskörper und Flotten auf einer einfachen interaktiven SVG-Fläche.', ['servergelieferte Positionen', 'Auswahl und Fokus', 'zugängliche alternative Liste', 'kein physikalischer Orbit'], ['3D', 'freie Kamerasimulation', 'Galaxiekarte'], ['Karte erfindet keine Position oder Erreichbarkeit.', 'Tastatur/Liste ermöglicht dieselbe Auswahl.', 'Leere und laufende Reisestatus sind sichtbar.'], ['Komponenten- und Interaktionstests']);

            add('A2', 'Schiffs- und Flottenpanel umsetzen', 'GAL-FLEET-ENTITY-001', ['ui', 'api'], ['galaxis-server#25', 'GAL-CLIENT-SYSTEM-MAP-001'], 'Der Spieler sieht sein Erkundungsschiff, seine Flotte, den aktuellen Standort und den serverseitigen Zustand.', ['Flottenliste', 'Schiffsdetails aus statischem Katalog', 'Auswahl mit Karte synchronisieren', 'Status und erlaubte Aktionen aus Serverantwort'], ['Flottenaufteilung', 'Schiffsbau', 'Kampfwerte'], ['Keine Aktion wird allein aus lokalen Regeln freigegeben.', 'Unbekannte Katalogfelder werden toleriert.', 'Standort und Kartenmarkierung stimmen überein.'], ['Komponententests', 'Contract-Fixture']);

            add('A2', 'Lokales Ziel wählen und Bewegungsbefehl senden', 'GAL-FLEET-MOVE-LOCAL-001', ['ui', 'api'], ['galaxis-server#23', 'GAL-FLEET-ENTITY-001'], 'Der Spieler kann für seine ausgewählte Flotte ein vom Server angebotenes lokales Ziel wählen und den Befehl bestätigen.', ['Zielauswahl aus Navigationsressource', 'Dauer und erwartetes Ergebnis anzeigen', 'clientCommandId pro Benutzeraktion', 'expectedStateVersion und Konfliktbehandlung'], ['interstellare Ziele', 'optimistisches Versetzen der Flotte'], ['Flotte bewegt sich visuell erst nach angenommener Serverantwort.', 'Doppelklick wiederholt dieselbe ID oder wird deaktiviert.', '409-Konflikt lädt Zustand neu und erklärt die Änderung.'], ['Command-Store-Test', 'Komponententest', 'Contract-Mock']);

            add('A2', 'Reisefortschritt und Ankunft darstellen', 'GAL-FLEET-TRAVEL-LOCAL-001', ['ui', 'api'], ['galaxis-server#24', 'GAL-FLEET-MOVE-LOCAL-001'], 'Laufende lokale Reise wird mit Start, Ziel, serverseitiger Dauer und aktuellem Zustand dargestellt.', ['Zeitprojektion nur zur Anzeige', 'regelmäßige sichere Statusabfrage', 'Ankunft aus Serverzustand übernehmen', 'Seitenreload während Reise'], ['Hintergrundbenachrichtigung', 'Changes-Feed'], ['Client schließt Reise niemals selbst ab.', 'Uhrabweichung verändert keinen fachlichen Zustand.', 'Reload erhält Befehl und Fortschritt.'], ['Fake-Timer-Komponententest', 'Statusübergangstest']);

            add('A2', 'A2-End-to-End-Demo lokale Schiffsbewegung absichern', 'GAL-CLIENT-A2-E2E-001', ['e2e', 'vertical-slice'], ['alle A2-Client-Issues', 'galaxis-server#26'], 'Die komplette A2-Demo wird gegen echten Server und kontrollierte Kampagnenzeit geprüft.', ['A1-Kampagne öffnen', 'Erkundungsschiff wählen', 'lokales Ziel wählen', 'Befehl senden', 'Zeit fortsetzen oder Testclock steuern', 'Ankunft sehen'], ['interstellare Reise'], ['Kein Sleep wartet auf reale Spielzeit.', 'Trace enthält Command-ID und Seed.', 'Reload während Reise ist Teil des Tests.'], ['Playwright A2-Smoke']);

            add('A3', 'Wissensgefilterte Galaxiekarte umsetzen', 'GAL-GALAXY-KNOWLEDGE-001', ['ui', 'api'], ['galaxis-server#28', 'galaxis-server#32', 'galaxis-docs#131'], 'Eine zweidimensionale Galaxiekarte zeigt ausschließlich bekannte Systeme, sichtbare Verbindungen und ausdrücklich unbekannte Nachbarziele.', ['Wissensstufen visuell unterscheiden', 'keine Platzhalter für intern unbekannte Objekte', 'Systemauswahl und Detailpanel', 'zugängliche Systemliste'], ['große Galaxieoptimierung', 'politische Kartenmodi'], ['Antwortdaten werden ohne lokale Vervollständigung dargestellt.', 'Unbekannte Ziele zeigen nur freigegebene Eigenschaften.', 'Karte funktioniert mit A3-Minimalgalaxie.'], ['Komponententests pro Wissensstufe', 'Informationsleck-Fixture']);

            add('A3', 'Interstellare Route wählen und Reisebefehl senden', 'GAL-FLEET-MOVE-INTERSTELLAR-001', ['ui', 'api'], ['galaxis-server#29', 'GAL-GALAXY-KNOWLEDGE-001'], 'Das Erkundungsschiff kann über eine vom Server freigegebene Verbindung zu einem unbekannten Nachbarsystem entsendet werden.', ['Flotte und Ziel verknüpfen', 'Route, Dauer und Transitrisiko aus Serverantwort', 'Bestätigung und Command-ID', 'Transitstatus'], ['Mehrfachrouten', 'Versorgungsplanung'], ['Keine verborgene Route wird berechnet.', 'Konflikte und ungültige Position werden verständlich behandelt.', 'Transitposition wird korrekt dargestellt.'], ['Command-Komponententest', 'Contract-Mock']);

            add('A3', 'Erkundungsauftrag starten und Status darstellen', 'GAL-FLEET-EXPLORE-001', ['ui', 'api'], ['galaxis-server#30', 'GAL-FLEET-MOVE-INTERSTELLAR-001'], 'Nach Ankunft kann ein freigegebener Erkundungsauftrag gestartet und bis zum serverseitigen Abschluss verfolgt werden.', ['Action aus Serverzustand', 'Dauer und Status', 'keine lokale Ergebnisvorschau', 'Fehler und bereits erkundet'], ['Anomalieentscheidungen', 'Kolonisierung'], ['Erkundung startet nur nach angenommener Antwort.', 'Client deckt Systemdetails nicht vor Abschluss auf.', 'Reload erhält laufenden Auftrag.'], ['Komponententest', 'Statusübergangstest']);

            add('A3', 'Entdeckungsergebnis und Rückkehrübersicht umsetzen', 'GAL-OFFLINE-EXPLORE-001', ['ui', 'api'], ['galaxis-server#31', 'galaxis-server#32', 'GAL-FLEET-EXPLORE-001'], 'Neu entdeckte Informationen und während Abwesenheit abgeschlossene Reise-/Erkundungsschritte werden verdichtet dargestellt.', ['Erkundungsbericht', 'neue/aktualisierte Informationen kennzeichnen', 'kritisch/wichtig/informativ/Routine-Grundstufen', 'Link zur neuen Systemansicht'], ['allgemeines Ereigniszentrum'], ['Bericht wird nicht aus lokalem Diff erfunden.', 'Mehrfaches Öffnen dupliziert keine Meldung.', 'Abwesenheit ohne Änderungen zeigt klaren leeren Zustand.'], ['Komponenten- und Storetests']);

            add('A3', 'Inkrementelle A3-Synchronisierung über Changes implementieren', 'GAL-API-CHANGES-001', ['api'], ['galaxis-server#32'], 'Kampagnenänderungen seit der letzten stateVersion werden sicher abgefragt und in Stores eingespielt.', ['Polling mit after/limit', 'hasMore-Schleife', 'Snapshot-Fallback bei abgelaufener Version', 'reichsspezifische Stores aktualisieren'], ['Long Polling', 'WebSocket'], ['Änderungen werden in Versionsreihenfolge angewandt.', 'Doppelte Change-Antwort ist idempotent.', 'Snapshot-Fallback ersetzt Zustand atomar.', 'Keine Command-POST-Wiederholung.'], ['Store-Unit-Tests', 'Paginationstest', 'Fallbacktest']);

            add('A3', 'A3-End-to-End-Demo interstellare Erkundung absichern', 'GAL-CLIENT-A3-E2E-001', ['e2e', 'vertical-slice'], ['alle A3-Client-Issues', 'galaxis-server#33'], 'Die vollständige A3-Demo wird gegen echten Server mit kontrollierter Kampagnenzeit ausgeführt.', ['A2-Kampagne öffnen', 'Nachbarsystem wählen', 'interstellare Reise', 'Erkundung starten', 'Abwesenheit simulieren', 'neue Systemdaten und Bericht prüfen'], ['zweite Kolonie'], ['Details sind vor Abschluss verborgen und danach sichtbar.', 'Normaler und Offline-Ablauf sind in separaten Tests gleichwertig.', 'Seed, Command-IDs und stateVersions werden bei Fehler protokolliert.'], ['Playwright A3-Smoke und Offline-Variante']);

            const existing = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'all', per_page: 100 });
            const result = [];
            for (const spec of specs) {
              let issue = existing.find(item => !item.pull_request && item.title === spec.title);
              if (!issue) issue = (await github.rest.issues.create({ owner, repo, title: spec.title, body: spec.body, labels: spec.labels, milestone: spec.milestone })).data;
              else issue = (await github.rest.issues.update({ owner, repo, issue_number: issue.number, title: spec.title, body: spec.body, labels: spec.labels, milestone: spec.milestone, state: 'open' })).data;
              result.push({ number: issue.number, title: issue.title, milestone: issue.milestone?.number });
            }
            const path = '.github/alpha-client-issues.json';
            let sha;
            try { sha = (await github.rest.repos.getContent({ owner, repo, path, ref: 'main' })).data.sha; } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({ owner, repo, path, branch: 'main', sha, message: 'chore: record alpha client issues', content: Buffer.from(JSON.stringify(result, null, 2) + '\n').toString('base64') });
